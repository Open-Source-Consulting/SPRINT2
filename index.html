<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOVI - Precision Camera</title>

    <!-- API EXTERNO -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">

    <!-- CSS EXTERNO -->
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body class="app-wrapper">
    <!-- App Container -->
    <main class="app-container" id="camera-app">
        <!-- Viewfinder Layer -->
        <div class="viewfinder-layer">
            <img id="camera-view" src="src/assets/imagem1.png" alt="Camera view" class="camera-view">
            <div class="scanline" aria-hidden="true"></div>
            <div class="viewfinder-overlay" aria-hidden="true"></div>
        </div>

        <!-- Navegação superior -->
        <header>
            <div class="header-group">
                <button class="icon-btn" aria-label="Settings">
                    <span class="material-symbols-outlined">settings</span>
                </button>
                <button class="icon-btn primary" aria-label="Flash">
                    <span class="material-symbols-outlined">flash_on</span>
                </button>
            </div>

            <div class="header-group">
                <button class="status-badge" aria-label="HDR settings">
                    <span class="badge-text-hdr">HDR</span>
                </button>
                <button class="status-badge" aria-label="Resolution and framerate">
                    <div class="badge-resolution">
                        <span class="res-main">4K</span>
                        <span class="res-sub">60</span>
                    </div>
                </button>
            </div>
        </header>

        <!-- Seletor de modo -->
        <nav class="mode-picker" aria-label="Camera Modes">
            <div class="mode-list">
                <button class="mode-item">Night</button>
                <button class="mode-item">Portrait</button>
                <button class="mode-item active">Photo</button>
                <button class="mode-item">Video</button>
                <button class="mode-item">Mais</button>
            </div>
        </nav>
