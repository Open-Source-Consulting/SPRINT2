<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOVI - Precision Camera</title>

    <!-- API EXTERNO -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">

    <!-- CSS EXTERNO -->
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body class="app-wrapper">
    <!-- App Container -->
    <main class="app-container" id="camera-app">
        <!-- Viewfinder Layer -->
        <div class="viewfinder-layer">
            <div class="grid-pattern"></div>

            <!-- Mais Conteúdo de Modos (Substituir Imagem) -->
            <div class="more-viewfinder-grid">
                <div class="modes-grid">
                    <div class="mode-option">
                        <div class="mode-icon-wrapper"><span class="material-symbols-outlined">aperture</span></div>
                        <span class="mode-label">PRO</span>
                    </div>
                    <div class="mode-option">
                        <div class="mode-icon-wrapper"><span class="material-symbols-outlined">panorama</span></div>
                        <span class="mode-label">PANORAMA</span>
                    </div>
                    <div class="mode-option">
                        <div class="mode-icon-wrapper"><span class="material-symbols-outlined">slow_motion_video</span>
                        </div>
                        <span class="mode-label">CÂMERA LENTA</span>
                    </div>
                    <div class="mode-option">
                        <div class="mode-icon-wrapper"><span class="material-symbols-outlined">timelapse</span></div>
                        <span class="mode-label">TIME-LAPSE</span>
                    </div>
                    <div class="mode-option">
                        <div class="mode-icon-wrapper"><span class="material-symbols-outlined">nights_stay</span></div>
                        <span class="mode-label">NOITE+</span>
                    </div>
                    <div class="mode-option">
                        <div class="mode-icon-wrapper"><span class="material-symbols-outlined">document_scanner</span>
                        </div>
                        <span class="mode-label">DOCUMENTO</span>
                    </div>
                    <div class="mode-option">
                        <div class="mode-icon-wrapper"><span class="material-symbols-outlined">flare</span></div>
                        <span class="mode-label">ASTRO</span>
                    </div>
                    <div class="mode-option">
                        <div class="mode-icon-wrapper"><span class="material-symbols-outlined">camera_enhance</span>
                        </div>
                        <span class="mode-label">PROFISSIONAL</span>
                    </div>
                    <div class="mode-option">
                        <div class="mode-icon-wrapper"><span class="material-symbols-outlined">edit</span></div>
                        <span class="mode-label">INSTANTÂNEO</span>
                    </div>
                    <div class="mode-option">
                        <div class="mode-icon-wrapper"><span class="material-symbols-outlined">restaurant</span></div>
                        <span class="mode-label">COMIDA</span>
                    </div>
                    <div class="mode-option">
                        <div class="mode-icon-wrapper"><span class="material-symbols-outlined">split_screen</span></div>
                        <span class="mode-label">VISUALIZAÇÃO DUPLA</span>
                    </div>
                    <div class="mode-option">
                        <div class="mode-icon-wrapper"><span class="material-symbols-outlined">motion_photos_on</span>
                        </div>
                        <span class="mode-label">FOTO EM MOVIMENTO</span>
                    </div>
                </div>
            </div>

            <div class="scanline" aria-hidden="true"></div>
            <div class="viewfinder-overlay" aria-hidden="true"></div>
        </div>

        <!-- Navegação superior -->
        <header>
            <div class="header-group">
                <button class="icon-btn" aria-label="Settings">
                    <span class="material-symbols-outlined">settings</span>
                </button>
                <button class="icon-btn primary" aria-label="Flash">
                    <span class="material-symbols-outlined">flash_on</span>
                </button>
            </div>
